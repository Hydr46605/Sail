name: Sail CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Run checks
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Run Gradle tests
        run: ./gradlew test

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        ports:
          - 15432:5432
        env:
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: sail_dev_password
          POSTGRES_DB: sail
        options: >-
          --health-cmd "pg_isready -U sail -d sail"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SAIL_REGISTRY_STATE_BACKEND: postgres
      SAIL_REGISTRY_DATABASE_URL: postgres://sail:sail_dev_password@127.0.0.1:15432/sail
      SAIL_REGISTRY_ALLOW_DEV_SIGNING_KEY: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run registry migrations
        run: pnpm --filter @sail/registry db:migrate

      - name: Run registry database tests
        run: pnpm --filter @sail/registry test:db
