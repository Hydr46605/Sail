services:
  postgres:
    image: postgres:18-alpine
    container_name: sail-postgres-local
    environment:
      POSTGRES_DB: sail
      POSTGRES_USER: sail
      POSTGRES_PASSWORD: sail_dev_password
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sail -d sail"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - sail-postgres-data:/var/lib/postgresql

volumes:
  sail-postgres-data:
